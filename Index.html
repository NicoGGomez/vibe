<!DOCTYPE html>
<html lang="es">
<head>
    
    <!-- sacar dsp -->
    <meta name="google" content="notranslate"> 
    <!--  -->

    <!-- metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- info general -->
    <title>Vibe - Home</title>
    <link rel="icon" href="Imgs/logo-vibe.png" type="image/png">

    <!-- estilos -->
    <link rel="stylesheet" href="Styles/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

    <!-- nav -->

    <nav-bar class="cont"></nav-bar>

    <!-- seccion principal -->

    <div class="cont contenido-principal">
        <img src="Imgs/fundas.png" alt="">
    </div>
    
    <div class="cont texto-principal">
        <h1>¡Bienvenido a Vibe!</h1>
        <p>Variedad que conecta con tu estilo.</p>
    </div>

    <div class="separador"></div>

    <!-- seccion ofertas -->

    <div class="cont ofertas">
        <img class="logo" src="Imgs/productos-oferta.png" alt="">
    
        <div class="carrusel-oferta">

            <div class=" productos-oferta">

                <div class="cards">

                    <card-comp 
                    nombre='Funda iphone 11' 
                    precio='10.000'>
                    </card-comp>
                    <card-comp 
                    nombre='Funda iphone 11' 
                    precio='10.000'>
                    </card-comp>
                    <card-comp 
                    nombre='Funda iphone 11' 
                    precio='10.000'>
                    </card-comp>

                </div>

            </div>

        </div>
    
    </div>

    <!-- seccion destacados -->

    <div class="cont destacados">
        <img class="logo" src="Imgs/productos-destacados.png" alt="">
    
        <div class="cont productos-destacados">

            <script>
                const contenedor = document.querySelector(".productos-destacados");

                for (let i = 0; i < 9; i++) {
                    const card = document.createElement("card-comp");
                    card.setAttribute("id-producto", i);
                    card.setAttribute("nombre", "Funda iPhone 11");
                    card.setAttribute("precio", "10.000");
                    contenedor.appendChild(card);
                }
            </script>

        </div>
    
    </div>

    <!-- seccion ingreso al catalogo -->

    <div class="cont seccion-catalogo">
        <div class="separador"></div>
        <button><a href="Productos.html">Ver catalogo completo</a></button>
        <div class="separador"></div>
    </div>

    <!-- footer -->

    <footer-comp class="cont"></footer-comp>

    <!-- link a scripts -->

    <script src="Components/Card.js"></script>
    <script src="Components/Footer.js"></script>
    <script src="Components/NavBar.js"></script>
    <script src="Scripts/Carrusel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    
    <!-- sacar dsp -->
    <meta name="google" content="notranslate"> 
    <!--  -->

    <!-- metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- info general -->
    <title>Vibe - Contacto</title>
    <link rel="icon" href="Imgs/logo-vibe.png" type="image/png">

    <!-- estilos -->
    <link rel="stylesheet" href="Styles/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>
<body>

    <!-- nav -->

    <nav-bar class="cont"></nav-bar>

    <!-- bread crumb -->

    <bread-crumb links='Home,Nosotros,Contacto'></bread-crumb>

    <!-- seccion contacto -->

    <img src="Imgs/contacto.png" alt="">

    <!-- form -->

    <div class="cont seccion-contacto">

        <form id="contactForm" action="">

            <div class="input">
                <label for="nombreInput">Ingresa tu Nombre</label>
                <input type="text" name="nombre" id="nombreInput">
            </div>

            <div class="input">
                <label for="mailInput">Ingresa tu Mail</label>
                <input type="email" name="email" id="mailInput">
            </div>

            <div class="input input-msg">
                <label for="msgInput">Ingresa tu mensaje</label>
                <textarea name="message" id="msgInput" ></textarea>
            </div>

            <button type="submit">Enviar</button>

        </form>

    </div>

    <div class="separador"></div>

    <!-- footer -->

    <footer-comp class="cont"></footer-comp>

    <!-- link a scripts -->

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
    emailjs.init("Z1zZWU8mOaSMKb943");
    </script>
    <script src="Scripts/EnvioMensaje.js"></script>
    <script src="Components/BreadCrumb.js"></script>
    <script src="Components/Footer.js"></script>
    <script type="module" src="Components/NavBar.js"></script>
</body>
</html>

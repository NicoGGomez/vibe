<!DOCTYPE html>
<html lang="es">
<head>
    
    <!-- sacar dsp -->
    <meta name="google" content="notranslate"> 
    <!--  -->

    <!-- metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- info general -->
    <title>Vibe - Productos</title>
    <link rel="icon" href="Imgs/logo-vibe.png" type="image/png">

    <!-- estilos -->
    <link rel="stylesheet" href="Styles/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>
<body>

    <!-- nav -->

    <nav-bar class="cont"></nav-bar>

    <!-- bread crumb -->

    <bread-crumb links='Home,Productos'></bread-crumb>

    <!-- contenido productos -->

    <div class="cont contenedor-productos">

        <img src="Imgs/productos-destacados.png" alt="">

        <div class="cont contenedor-categorias">
            <div class="categorias">
                <ul id="lista-categorias"></ul>
            </div>
            <div class="separador"></div>
        </div>

        <div class="cont productos">

                <script>
                        const contenedor = document.querySelector(".productos");

                        for (let i = 0; i < 12; i++) {
                            const card = document.createElement("card-comp");
                            card.setAttribute("id-producto", i);
                            card.setAttribute("nombre", "Funda iPhone 11");
                            card.setAttribute("precio", "10.000");
                            contenedor.appendChild(card);
                        }
                </script>

        </div>

    </div>
    
    <!-- footer -->

    <footer-comp class="cont"></footer-comp>

    <!-- link a scripts -->

    <script src="Scripts/categorias.js"></script>
    <script src="Components/BreadCrumb.js"></script>
    <script src="Components/Card.js"></script>
    <script src="Components/Footer.js"></script>
    <script src="Components/NavBar.js"></script>
</body>
</html>

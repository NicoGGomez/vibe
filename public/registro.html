<!DOCTYPE html>
<html lang="es">
<head>
    
    <!-- sacar dsp -->
    <meta name="google" content="notranslate"> 
    <!--  -->

    <!-- metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- info general -->
    <title>Vibe - Registro</title>
    <link rel="icon" href="Imgs/logo-vibe.png" type="image/png">

    <!-- estilos -->
    <link rel="stylesheet" href="Styles/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>
<body>

    <!-- nav -->

    <nav-bar class="cont"></nav-bar>

    <!-- seccion producto cargar producto -->

    <div class="cont contenedor-registro">

        <form class="form-registro" id="form-registro" action="">

            <div class="input">
                <label for="input-lg-nombre">Nombre</label>
                <input type="text" id="input-lg-nombre" required>
            </div>

            <div class="input">
                <label for="input-lg-apellido">Apellido</label>
                <input type="text" id="input-lg-apellido" required>
            </div>

            <div class="input">
                <label for="input-lg-email">Email</label>
                <input type="email" id="input-lg-email" required>
            </div>

            <div class="input">
                <label for="input-lg-password">Contraseña</label>
                <input type="password" id="input-lg-password" required>
            </div>

            <button type="submit">Registrarme</button>

            <a href="login.html">¿Ya tenes cuenta? Ingresa aqui.</a>

        </form>

    </div>

    <!-- footer -->

    <footer-comp class="cont"></footer-comp>

    <!-- link a scripts -->

    <script type="module" src="Scripts/registro.js"></script>
    <script src="Components/Footer.js"></script>
    <script src="Components/NavBar.js"></script>
</body>
</html>

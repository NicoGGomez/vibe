<!DOCTYPE html>
<html lang="es">
<head>
    
    <!-- sacar dsp -->
    <meta name="google" content="notranslate"> 
    <!--  -->

    <!-- metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- info general -->
    <title>Vibe - Cargar producto</title>
    <link rel="icon" href="Imgs/logo-vibe.png" type="image/png">

    <!-- estilos -->
    <link rel="stylesheet" href="Styles/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>
<body>

    <!-- nav -->

    <nav-bar class="cont"></nav-bar>

    <!-- seccion producto cargar producto -->

    <div class="cont contenedor-cargar-producto">

        <form class="form-carga-producto" id="form-carga-producto" action="">

            <div class="input">
                <label for="input-pr-nombre">Nombre del producto</label>
                <input type="text" id="input-pr-nombre" required>
            </div>

            <div class="input">
                <label for="input-pr-precio">Precio</label>
                <input type="number" min="0" step="0.01" id="input-pr-precio" required>
            </div>

            <div class="input">
                <label for="input-pr-descr">Descripción</label>
                <textarea name="" id="input-pr-descr" required></textarea>
            </div>

            <div class="input">
                <label for="input-pr-img">cargar imagen principal</label>
                <input type="file" accept="image/*" name="" id="input-pr-img" required>
            </div>

            <div class="input">
                <label for="input-pr-img-ex1">cargar imagen extra uno</label>
                <input type="file" accept="image/*" name="" id="input-pr-img-ex1">
            </div>

            <div class="input">
                <label for="input-pr-img-ex2">cargar imagen extra dos</label>
                <input type="file" accept="image/*" name="" id="input-pr-img-ex2">
            </div>

            <div class="input">
                <label for="input-pr-img-ex3">cargar imagen extra tres</label>
                <input type="file" accept="image/*" name=""id="input-pr-img-ex3">                
            </div>

            <div class="input">
                <label for="input-pr-stock">Stock</label>
                <input type="number" min="0" id="input-pr-stock" required>
            </div>

            <div class="input">
                <label for="">selecciona la categoria</label>
                    <select id="categoria" name="categoria" required>
                    </select>
                <a href="cargarCategoria.html">¿No ves la categoría? cargala aca</a>
            </div>

            <button type="submit">Cargar producto</button>

        </form>

    </div>

    <div class="contenedor-lista-productos">
        <h2>Productos cargados (preview)</h2>

        <div class="contenedor-productos">
            <div id="lista-cards-productos"></div>
            <div id="lista-productos"></div>
        </div>
    </div>
    
    <!-- footer -->

    <footer-comp class="cont"></footer-comp>

    <!-- link a scripts -->

    <script type="module" src="Scripts/cargar-producto.js"></script>
    <script src="Components/Card.js"></script>
    <script src="Components/Producto.js"></script>
    <script src="Scripts/productos.js"></script>
    <script src="Scripts/categorias-producto.js"></script>
    <script src="Components/Footer.js"></script>
    <script src="Components/NavBar.js"></script>
</body>
</html>
